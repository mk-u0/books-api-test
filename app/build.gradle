plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

configurations {
    agent {
        canBeResolved = true
        canBeConsumed = true
    }
}

dependencies {
    // Use TestNG framework, also requires calling test.useTestNG() below
    testImplementation libs.rest.assured
    testImplementation libs.rest.assured.jsonval
    testImplementation platform(libs.allure.bom)
    testImplementation libs.allure.testng
    testImplementation libs.testng
    testImplementation libs.google.oauth

    agent libs.aspectj
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

test {
    jvmArgs = [ "-javaagent:${configurations.agent.singleFile}" ]
}

tasks.named('test') {
    // Use TestNG for unit tests.
    useTestNG() {
        suites 'src/test/resources/testng.xml'
    }

    def envFile = rootProject.file('secret.env')
    if (envFile.exists()) {
        def env = new Properties()
        envFile.withInputStream { env.load(it) }

        env.each { key, value ->
            environment key, value
        }
    }
}
